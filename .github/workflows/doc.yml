name: Deploy Doc

on:
  push:
    branches: [ main ]

jobs:
  # Build job
  build:
    # Specify runner +  build & upload the static files as an artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static files
        env:
          CARGO_TERM_COLOR: always
        run: |
          cd rapx
          # rapx/target/doc/rapx/index.html
          cargo doc --document-private-items --no-deps

      - name: Install rustc internal docs
        run: |
          set -e
          rustup toolchain list -v
          export TOOLCHAIN=$(rustc --print sysroot)
          echo "toolchain=\"$TOOLCHAIN\""
          rustup component add rustc-docs
          DOC_SRC="$TOOLCHAIN/share/doc/rust/html/rustc"
          if [ -d "$DOC_SRC" ]; then
            cp -r "$DOC_SRC" rapx/target/doc/rustc
          else
            echo "rustc docs not found at $DOC_SRC, searching..."
            find "$TOOLCHAIN/share/doc" -name rustc -type d | head -5
            find "$TOOLCHAIN/share/doc" -name "*.html" | head -5
          fi

      - name: Prepare index.html
        run: |
          # Find toolchain name
          export toolchain=$(rustc --print sysroot | grep -oP "nightly-\d{4}-\d{2}-\d{2}")
          echo "toolchain=\"$toolchain\""
          # Fill in toolchain placeholder in index.html
          sed "s/nightly-xxxx-xx-xx/$toolchain/" .github/index.html > rapx/target/doc/index.html

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3 # or specific "vX.X.X" version tag for this action
        with:
          path: rapx/target/doc/

  # Deployment job
  deploy:
    if: github.repository == 'safer-rust/RAPx'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
